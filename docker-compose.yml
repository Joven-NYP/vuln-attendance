version: '3.8'

services:
  web:
    build: .
    container_name: vuln_attendance_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=development
      - ENCRYPTION_KEY=secret123
    networks:
      - vuln_net

  db:
    image: mysql:8.0
    container_name: vuln_attendance_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: attendance_db
      MYSQL_USER: attendance_user
      MYSQL_PASSWORD: attendance_pass
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vuln_net

volumes:
  db_data:

networks:
  vuln_net:
    driver: bridge
